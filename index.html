        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {

    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            overflow: hidden;
            user-select: none;
        }

        /* Ambient Orbs */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background-color: #1DB954; }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background-color: #0D9488; animation-delay: -5s; }

        /* Abstract Background Lines */
        .bg-lines {
            position: fixed; inset: 0; z-index: -2; opacity: 0.1;
            background-image: linear-gradient(#0D9488 1px, transparent 1px), linear-gradient(90deg, #0D9488 1px, transparent 1px);
            background-size: 100px 100px;
            transform: perspective(500px) rotateX(60deg) scale(2);
            transform-origin: top;
        }

        /* Glassmorphism & Borders */
        .glass {
            background: rgba(24, 24, 24, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-card {
            background: rgba(18, 18, 18, 0.65);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02), 0 20px 40px rgba(0,0,0,0.8);
        }
        
        .glass-card:hover {
            background: rgba(24, 24, 24, 0.85);
            transform: translateY(-5px);
            border-color: rgba(29, 185, 84, 0.5);
            box-shadow: inset 0 0 20px rgba(29,185,84,0.05), 0 20px 40px rgba(0,0,0,0.9);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-red { animation: pulseRed 0.5s ease-out; }
        @keyframes pulseRed { 0% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: transparent; } }

        .pulse-green { animation: pulseGreen 0.5s ease-out; }
        @keyframes pulseGreen { 0% { background-color: rgba(29, 185, 84, 0.2); } 100% { background-color: transparent; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1DB954; }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #1DB954; cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.8); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }

        /* 3D Flip Cards */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .flipped .card-inner { transform: rotateY(180deg); }

        /* Concept Pillars */
        .pillar { transition: all 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); cursor: pointer; }
        .pillar-expanded { flex: 4; background: rgba(40,40,40,0.9) !important; border-color: #1DB954 !important;}
        .pillar-collapsed { flex: 1; opacity: 0.5; }
        .pillar-collapsed:hover { opacity: 0.8; }

        /* Sync Lyrics */
        .lyric-line { transition: all 0.2s; cursor: pointer; opacity: 0.4; }
        .lyric-line:hover { opacity: 1; color: #FFFFFF; transform: translateX(10px); }
        .lyric-active { opacity: 1; color: #1DB954; font-weight: 800; transform: scale(1.05) translateX(10px); border-left-color: #1DB954 !important; }

        /* Word Chips (Lyric Builder) */
        .draggable-word { 
            cursor: grab; touch-action: manipulation; 
            border-radius: 500px !important; background-color: #1DB954 !important; color: #000 !important; font-weight: 900 !important;
            border: none !important; box-shadow: 0 4px 15px rgba(29,185,84,0.4);
        }
        .draggable-word:active { cursor: grabbing; transform: scale(0.95); opacity: 0.9; box-shadow: 0 2px 5px rgba(29,185,84,0.4); }
        
        .drop-zone {
            border: 2px dashed rgba(29, 185, 84, 0.4) !important;
            background: rgba(0,0,0,0.4) !important;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .bucket-over { border-color: #1DB954 !important; background-color: rgba(29,185,84,0.15) !important; box-shadow: inset 0 0 30px rgba(29,185,84,0.2); }

        /* Epic Start Button */
        .btn-start-epic {
            position: relative;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid #1DB954;
            color: #1DB954;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.2), inset 0 0 15px rgba(29, 185, 84, 0.1);
        }
        .btn-start-epic:hover {
            background: #1DB954;
            color: #000;
            box-shadow: 0 0 40px rgba(29, 185, 84, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px) scale(1.02);
        }
        .btn-start-epic::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg);
            transition: 0.6s;
        }
        .btn-start-epic:hover::before { left: 200%; }

        /* Speaking Hub Panel */
        .speaking-hub-panel {
            position: relative;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px 24px 20px 24px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(29,185,84,0.05);
        }
        .speaking-hub-badge {
            position: absolute;
            top: -14px;
            left: 24px;
            background: #1DB954;
            color: #000;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.5);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Ear Training Words */
        .ear-word { cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .ear-word:hover { border-bottom-color: #FFFFFF; }
        .ear-wrong { color: #ef4444; border-bottom-color: #ef4444 !important; font-weight: 800; text-decoration: line-through; }
        .ear-correct { color: #1DB954; font-weight: 800; border-bottom-color: #1DB954 !important;}

        #wb-text-input { touch-action: manipulation; font-family: 'Inter', sans-serif; }
    </style>
</head>

            canvas: null, ctx: null, input: null, color: '#1DB954', typingPos: { x: 0, y: 0 },
            init() {
                this.canvas = document.getElementById('wb-canvas');
                this.input = document.getElementById('wb-text-input');
                if (!this.canvas || !this.input) return;
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => this.resize());
                this.canvas.addEventListener('click', this.handleCanvasClick.bind(this));
                this.input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.commitText(); } });
                this.input.addEventListener('blur', () => this.commitText());
                this.input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('border-2', 'border-white', 'scale-110'));
                        e.target.classList.add('border-2', 'border-white', 'scale-110');
                        this.color = e.target.getAttribute('data-color');
                        if (!this.input.classList.contains('hidden')) this.input.style.color = this.color;
                    });
                });
            },
            resize() {
                if(!this.canvas) return;
                const parent = this.canvas.parentElement;
                if (!parent) return;
                let tempCanvas = null;
                if (this.canvas.width > 0 && this.canvas.height > 0) {
                    tempCanvas = document.createElement('canvas');
                    tempCanvas.width = this.canvas.width; tempCanvas.height = this.canvas.height;
                    tempCanvas.getContext('2d').drawImage(this.canvas, 0, 0);
                }
                this.canvas.width = parent.clientWidth; this.canvas.height = parent.clientHeight;
                if (tempCanvas && this.ctx) this.ctx.drawImage(tempCanvas, 0, 0);
            },
            handleCanvasClick(e) {
                if (!this.input.classList.contains('hidden')) { this.commitText(); return; }
                const rect = this.canvas.getBoundingClientRect();
                let clientX = e.clientX; let clientY = e.clientY;
                if(e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                this.typingPos = { x: clientX - rect.left, y: clientY - rect.top };
                this.input.value = '';
                this.input.style.left = this.typingPos.x + 'px'; this.input.style.top = this.typingPos.y + 'px';
                this.input.style.color = this.color;
                this.input.style.height = '40px'; 
                this.input.classList.remove('hidden'); this.input.classList.add('block');
                setTimeout(() => this.input.focus(), 50);
            },
            commitText() {
                if (this.input.classList.contains('hidden')) return;
                const text = this.input.value.trim();
                if (text !== '') {
                    this.ctx.font = 'bold 20px Inter, sans-serif';
                    this.ctx.fillStyle = this.color;
                    this.ctx.textBaseline = 'top';
                    const lines = text.split('\n');
                    let currentY = this.typingPos.y + 8; 
                    lines.forEach(line => { this.ctx.fillText(line, this.typingPos.x + 8, currentY); currentY += 28; });
                }
                this.input.classList.add('hidden'); this.input.classList.remove('block');
            },
            clear() {
                if(this.ctx) { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.input.classList.add('hidden'); }
            }
        };

        // --- STATE MANAGEMENT ---
        const app = {
            trackData: lessonData,
            currentIndex: -1, // -1 is Dashboard
            hp: 100,
            xp: 0,
            isPlaying: false,

            init() {
                this.renderDashboard();
                whiteboard.init(); 
                lucide.createIcons();

            loadLevel() {
                this.currentIndex = 0;

                this.xp = 0;

            },

            goHome() {
                this.currentIndex = -1;
                document.getElementById('status-bar').classList.add('hidden');
                document.getElementById('status-bar').classList.remove('flex');
                this.renderDashboard();
            },

            updateStatus() {
                document.getElementById('hp-display').innerText = `${this.hp} HP`;
                document.getElementById('xp-display').innerText = `${this.xp} XP`;
                
                if (this.currentIndex >= 0) {
                    const current = this.currentIndex + 1;
                    const total = this.trackData.length;
                    document.getElementById('progress-current').innerText = current;
                    document.getElementById('progress-total').innerText = total;
                    document.getElementById('progress-bar-fill').style.width = `${(current / total) * 100}%`;
                }
            },

            takeDamage(amount) {
                this.hp = Math.max(0, this.hp - amount);
                this.updateStatus();
                document.getElementById('main-container').classList.add('pulse-red');
                setTimeout(() => document.getElementById('main-container').classList.remove('pulse-red'), 500);
            },

            gainXP(amount) {
                this.xp += amount;
                this.updateStatus();
                document.getElementById('main-container').classList.add('pulse-green');
                setTimeout(() => document.getElementById('main-container').classList.remove('pulse-green'), 500);
            },

            nextSlide() {
                if (this.currentIndex >= 0 && this.currentIndex < this.trackData.length - 1) {
                    this.currentIndex++;
                    this.renderSlide();
                }
            },

            prevSlide() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.renderSlide();
                }
            },

            togglePlay() {
                this.isPlaying = !this.isPlaying;
                const icon = document.getElementById('play-icon');

                    icon.setAttribute('data-lucide', this.isPlaying ? 'pause' : 'play');

                }

                    } else {

                } else {

            renderBCategorization(data) {
                window.catState = { completed: 0, selectedWord: null, selectedElement: null };
                
                window.selectWordForMobile = function(el, index) {
                    if (window.innerWidth >= 768) return; 
                    if(el.classList.contains('opacity-0') || el.classList.contains('invisible')) return; 
                    
                    document.querySelectorAll('.draggable-word').forEach(w => w.classList.remove('ring-4', 'ring-white', 'scale-105'));
                    el.classList.add('ring-4', 'ring-white', 'scale-105');
                    window.catState.selectedWord = index;
                    window.catState.selectedElement = el;
                };

                window.selectBucketForMobile = function(bucketIndex, ev) {
                    if (window.innerWidth >= 768) return; 
                    if(window.catState.selectedWord === null) return;
                    
                    window.drop({ preventDefault: () => {}, currentTarget: ev.currentTarget, dataTransfer: { getData: () => window.catState.selectedWord } }, bucketIndex, true);
                    
                    if (window.catState.selectedElement) {
                        window.catState.selectedElement.classList.remove('ring-4', 'ring-white', 'scale-105');
                    }
                    window.catState.selectedWord = null;
                    window.catState.selectedElement = null;
                };
                
                window.dragStart = function(ev, wordIndex) {
                    ev.dataTransfer.setData("wordIndex", wordIndex);
                    if (ev.target?.classList) {
                        ev.target.classList.add('opacity-50', 'scale-95');
                    }
                };

                window.dragEnd = function(ev) {
                    if (ev.target?.classList) {
                        ev.target.classList.remove('opacity-50', 'scale-95');
                    }
                };

                window.allowDrop = function(ev) {
                    ev.preventDefault();
                    const bucket = ev.currentTarget;
                    if(bucket?.classList && !bucket.classList.contains('bucket-over')) {
                        bucket.classList.add('bucket-over');
                    }
                };

                window.dragLeave = function(ev) {
                    if (ev.currentTarget?.classList) {
                        ev.currentTarget.classList.remove('bucket-over');
                    }
                };

                window.drop = function(ev, bucketIndex, isMobileTap = false) {
                    if (ev.preventDefault) ev.preventDefault();
                    if (ev.currentTarget?.classList) {
                        ev.currentTarget.classList.remove('bucket-over');
                    }
                    
                    const wordIndex = ev.dataTransfer.getData("wordIndex");
                    if (wordIndex === "" || wordIndex === null) return;

                    if (!app.trackData || !app.trackData[app.currentIndex]) return;
                    const correctBucket = app.trackData[app.currentIndex].mapping ? app.trackData[app.currentIndex].mapping[wordIndex] : -1;
                    const wordEl = document.getElementById(`drag-word-${wordIndex}`);

                    if (!wordEl?.classList) return;

                    if (!isMobileTap) {
                        wordEl.classList.remove('opacity-50', 'scale-95');
                    }

                    if(bucketIndex == correctBucket) {
                        app.gainXP(20);
                        wordEl.setAttribute('draggable', 'false');
                        wordEl.classList.remove('hover:scale-105', 'cursor-pointer');
                        wordEl.classList.add('cursor-default', 'bg-spotify-green', 'text-black', 'border-transparent');
                        
                        const bucketContent = document.getElementById(`bucket-content-${bucketIndex}`);
                        if (bucketContent) {
                            bucketContent.appendChild(wordEl);
                        }
                        
                        window.catState.completed++;
                        if(data.items && window.catState.completed === data.items.length) {
                            setTimeout(() => {
                                const fb = document.getElementById('cat-feedback');
                                if(fb) {
                                    fb.innerHTML = `<div class="bg-spotify-green text-black p-4 rounded-xl font-black text-center w-full max-w-sm mx-auto shadow-2xl fade-in text-lg uppercase tracking-widest">Builder Complete! +XP</div>`;
                                }
                            }, 300);
                        }
                    } else {
                        app.takeDamage(10);
                        const targetBucket = isMobileTap ? document.getElementById(`bucket-${bucketIndex}`) : ev.currentTarget;
                        if (targetBucket?.classList) {
                            targetBucket.classList.add('pulse-red', 'border-red-500');
                            setTimeout(() => targetBucket?.classList.remove('pulse-red', 'border-red-500'), 500);
                        }
                    }
                };

                const words = data.items ? data.items.map((item, i) => `
                    <div id="drag-word-${i}" class="draggable-word px-6 md:px-8 py-3 md:py-4 text-sm md:text-xl transition-all duration-200 shadow-lg hover:scale-105" draggable="true" ondragstart="dragStart(event, ${i})" ondragend="dragEnd(event)" onclick="selectWordForMobile(this, ${i})">
                        ${item}
                    </div>
                `).join('') : '';

                const buckets = data.buckets ? data.buckets.map((b, i) => `
                    <div id="bucket-${i}" class="glass-card drop-zone rounded-3xl p-6 md:p-10 flex flex-col items-center min-h-[200px] md:min-h-[280px] transition-all duration-300 cursor-pointer relative overflow-hidden" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, ${i})" onclick="selectBucketForMobile(${i}, event)">
                        <h3 class="text-xl md:text-2xl font-black text-spotify-green mb-6 pointer-events-none text-center tracking-widest uppercase">${b}</h3>
                        <div id="bucket-content-${i}" class="flex flex-wrap justify-center gap-3 md:gap-4 w-full pointer-events-none mt-auto mb-auto z-10"></div>
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col items-center justify-center w-full max-w-6xl mx-auto space-y-10 md:space-y-16 min-h-[75vh] px-2">
                        <div class="text-center">

                                <i data-lucide="blocks" class="w-5 h-5"></i> Lyric Builder
                            </div>
                            <h2 class="text-3xl md:text-5xl font-black text-white">${data.title}</h2>
                        </div>
                        
                        <div id="words-container" class="flex flex-wrap justify-center gap-3 md:gap-5 w-full max-w-4xl p-6 rounded-3xl bg-white/5 border border-white/10 shadow-inner">
                            ${words}

                    </div>
                `;

            renderBWrap(data) {

                        </div>
                        <h1 class="text-5xl md:text-8xl font-black uppercase tracking-tighter text-white leading-none py-2">${data.title}</h1>
                        <p class="text-xl md:text-3xl font-medium text-spotify-subtext max-w-3xl leading-relaxed">${data.msg}</p>
                        
                        <div class="flex flex-col md:flex-row gap-6 md:gap-10 w-full md:w-auto mt-8 md:mt-12">
                            <div class="glass-card px-10 py-6 md:px-14 md:py-8 rounded-3xl text-center flex-1">
                                <p class="text-sm md:text-base font-black text-spotify-subtext uppercase tracking-widest mb-2">Final HP</p>
                                <p class="text-5xl md:text-6xl font-black text-white">${app.hp}</p>
                            </div>
                            <div class="glass-card px-10 py-6 md:px-14 md:py-8 rounded-3xl text-center border-t-4 border-t-spotify-green flex-1">
                                <p class="text-sm md:text-base font-black text-spotify-subtext uppercase tracking-widest mb-2">Total XP</p>
                                <p class="text-5xl md:text-6xl font-black text-spotify-green drop-shadow-[0_0_15px_rgba(29,185,84,0.6)]">${app.xp}</p>
                            </div>
                        </div>

                        <button onclick="app.goHome()" class="mt-12 md:mt-20 text-white/50 font-bold hover:text-white transition flex items-center justify-center gap-3 bg-white/5 w-full md:w-auto px-10 py-5 rounded-full hover:bg-white/10 text-lg">
                            <i data-lucide="log-out" class="w-6 h-6"></i> Return to Mission Select
                        </button>
                    </div>
                `;
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
